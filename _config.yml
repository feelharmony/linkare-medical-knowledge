title: "Linkare Medical Knowledge"
description: "Physician-authored medical knowledge, curated by Linkare"
url: "https://knowledge.linkerai.io"
baseurl: ""
lang: "ko"

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

defaults:
  - scope:
      path: "content"
    values:
      layout: "article"
  - scope:
      path: "conditions"
    values:
      layout: "entity-hub"
  - scope:
      path: "symptoms"
    values:
      layout: "entity-hub"
  - scope:
      path: "treatments"
    values:
      layout: "entity-hub"
  - scope:
      path: "body-parts"
    values:
      layout: "entity-hub"
  - scope:
      path: "doctors"
    values:
      layout: "entity-hub"
  - scope:
      path: "hospitals"
    values:
      layout: "entity-hub"

exclude:
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - vendor
  - scripts
  - data
