title: "Linkare Medical Knowledge"
description: "Physician-authored medical knowledge, curated by Linkare"
url: "https://knowledge.linkerai.io"
baseurl: ""
lang: "ko"

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

defaults:
  # content/ 하위 글 복사본 collection은 v2.4 Phase 6에서 폐기 (2026-04-28).
  # PROFILE.md만 유지되며 자체 frontmatter `layout: profile`로 처리됨.
  - scope:
      path: "conditions"
    values:
      layout: "entity-hub"
  - scope:
      path: "symptoms"
    values:
      layout: "entity-hub"
  - scope:
      path: "treatments"
    values:
      layout: "entity-hub"
  - scope:
      path: "body-parts"
    values:
      layout: "entity-hub"
  - scope:
      path: "doctors"
    values:
      layout: "entity-hub"
  - scope:
      path: "hospitals"
    values:
      layout: "entity-hub"

exclude:
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - vendor
  - scripts
  - data
