---
layout: default
title: "Knowledge Graph — Linkare Medical Knowledge"
description: "의료 전문가가 작성한 지식의 연결 구조"
permalink: /graph/
robots: "noindex, follow"
---

<div class="graph-page">
  <div class="graph-title-area">
    <h1>Medical Knowledge Graph</h1>
    <p class="graph-subtitle">의료 전문가가 작성한 지식의 연결 구조</p>
  </div>

  <div class="legend">
    <div class="legend-item"><span class="legend-dot" style="background:#ef4444"></span>질환</div>
    <div class="legend-item"><span class="legend-dot" style="background:#f59e0b"></span>증상</div>
    <div class="legend-item"><span class="legend-dot" style="background:#3b82f6"></span>치료</div>
    <div class="legend-item"><span class="legend-dot" style="background:#22c55e"></span>부위</div>
    <div class="legend-item"><span class="legend-dot" style="background:#8b5cf6"></span>의사</div>
    <div class="legend-item"><span class="legend-dot" style="background:#ec4899"></span>병원</div>
  </div>

  <div class="graph-controls">
    <span class="graph-controls-label">병원 필터:</span>
    <div id="hospital-toggles"></div>
    <button class="graph-demo-btn" id="crawl-demo-btn">🤖 AI 탐색 경로 시연</button>
  </div>

  <div class="graph-container" id="graph-container"></div>

  <div class="graph-crawl-path" id="crawl-path">
    <strong>AI 탐색 경로:</strong> <span id="crawl-path-text"></span>
  </div>

  <div class="graph-stats" id="graph-stats"></div>

  <div class="graph-back-links">
    <a href="{{ '/topics/' | relative_url }}">← 전체 주제 목록</a>
    <a href="{{ '/' | relative_url }}">← Knowledge 홈</a>
  </div>
</div>

<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<script>
  const graphData = {{ site.data.entity_graph | jsonify }};

  const TYPE_COLORS = {
    condition: '#ef4444', symptom: '#f59e0b', treatment: '#3b82f6',
    body_part: '#22c55e', doctor: '#8b5cf6', hospital: '#ec4899'
  };
  const TYPE_URLS = {
    condition: '/conditions/', symptom: '/symptoms/', treatment: '/treatments/',
    body_part: '/body-parts/', doctor: '/doctors/', hospital: '/hospitals/'
  };
  const HOSPITAL_NAMES = {};
  graphData.nodes.filter(n => n.type === 'hospital').forEach(n => {
    n.tenant_keys.forEach(tk => { HOSPITAL_NAMES[tk] = n.name_ko; });
  });

  let activeHospitals = new Set();
  const allHospitals = [...new Set(graphData.nodes.flatMap(n => n.tenant_keys || []))];
  allHospitals.forEach(h => activeHospitals.add(h));

  const toggleContainer = document.getElementById('hospital-toggles');
  allHospitals.forEach(h => {
    const btn = document.createElement('button');
    btn.className = 'graph-hospital-toggle active';
    btn.textContent = HOSPITAL_NAMES[h] || h;
    btn.dataset.hospital = h;
    btn.onclick = () => {
      if (activeHospitals.has(h)) { activeHospitals.delete(h); btn.classList.remove('active'); }
      else { activeHospitals.add(h); btn.classList.add('active'); }
      updateGraph();
    };
    toggleContainer.appendChild(btn);
  });

  const container = document.getElementById('graph-container');
  let network = null;

  function buildVisData() {
    const filteredEdges = graphData.edges.filter(e =>
      e.tenant_keys.some(t => activeHospitals.has(t))
    );
    const connectedIds = new Set();
    filteredEdges.forEach(e => { connectedIds.add(e.source); connectedIds.add(e.target); });

    const nodes = graphData.nodes
      .filter(n => connectedIds.has(n.id))
      .map(n => ({
        id: n.id, label: n.name_ko,
        color: { background: TYPE_COLORS[n.type] || '#999', border: TYPE_COLORS[n.type] || '#999',
          highlight: { background: TYPE_COLORS[n.type], border: '#1a1a1a' },
          hover: { background: TYPE_COLORS[n.type], border: '#1a1a1a' } },
        size: 12 + (n.post_count || 1) * 4,
        font: { size: 13, color: '#333', face: '"Pretendard Variable", sans-serif' },
        borderWidth: 2, shadow: { enabled: true, size: 4, color: 'rgba(0,0,0,0.08)' }
      }));

    const edges = filteredEdges.map(e => ({
      from: e.source, to: e.target,
      width: Math.max(1, Math.min(e.weight * 1.5, 6)),
      color: { color: '#e5e7eb', highlight: '#2563eb', hover: '#93c5fd' },
      smooth: { type: 'continuous' }
    }));

    return { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) };
  }

  function updateGraph() {
    const data = buildVisData();
    document.getElementById('graph-stats').textContent =
      `${data.nodes.length} entities · ${data.edges.length} connections · ${activeHospitals.size} hospitals`;

    if (network) {
      network.setData(data);
    } else {
      network = new vis.Network(container, data, {
        physics: {
          forceAtlas2Based: { gravitationalConstant: -40, centralGravity: 0.008, springLength: 120, springConstant: 0.04 },
          solver: 'forceAtlas2Based', stabilization: { iterations: 200 }, maxVelocity: 30
        },
        interaction: { hover: true, tooltipDelay: 100, zoomView: true, dragView: true },
        nodes: { shape: 'dot' }, edges: { smooth: { type: 'continuous' } }
      });

      network.on('click', (params) => {
        if (params.nodes.length > 0) {
          const node = graphData.nodes.find(n => n.id === params.nodes[0]);
          if (node) window.location.href = TYPE_URLS[node.type] + node.id + '/';
        }
      });

      network.on('hoverNode', (params) => {
        const connected = network.getConnectedNodes(params.node);
        const allNodes = network.body.data.nodes.get();
        network.body.data.nodes.update(allNodes.map(n => ({
          id: n.id, opacity: (n.id === params.node || connected.includes(n.id)) ? 1.0 : 0.15
        })));
      });

      network.on('blurNode', () => {
        const allNodes = network.body.data.nodes.get();
        network.body.data.nodes.update(allNodes.map(n => ({ id: n.id, opacity: 1.0 })));
      });
    }
  }

  let crawlRunning = false;
  document.getElementById('crawl-demo-btn').onclick = async () => {
    if (crawlRunning) return;
    crawlRunning = true;
    const btn = document.getElementById('crawl-demo-btn');
    btn.classList.add('running');
    btn.textContent = '🤖 탐색 중...';

    const pathEl = document.getElementById('crawl-path');
    const pathText = document.getElementById('crawl-path-text');
    pathEl.style.display = 'block';
    pathText.textContent = '';

    const startNode = graphData.nodes
      .filter(n => n.type === 'condition')
      .sort((a, b) => (b.post_count || 0) - (a.post_count || 0))[0];
    if (!startNode) { crawlRunning = false; return; }

    const visited = new Set([startNode.id]);
    const path = [startNode];
    let current = startNode;

    for (let i = 0; i < 4; i++) {
      const neighbors = graphData.edges
        .filter(e => (e.source === current.id || e.target === current.id) && e.tenant_keys.some(t => activeHospitals.has(t)))
        .map(e => e.source === current.id ? e.target : e.source)
        .filter(id => !visited.has(id));
      if (neighbors.length === 0) break;

      const nextId = neighbors.sort((a, b) => {
        const wa = graphData.edges.find(e => (e.source === current.id && e.target === a) || (e.target === current.id && e.source === a))?.weight || 0;
        const wb = graphData.edges.find(e => (e.source === current.id && e.target === b) || (e.target === current.id && e.source === b))?.weight || 0;
        return wb - wa;
      })[0];

      visited.add(nextId);
      const nextNode = graphData.nodes.find(n => n.id === nextId);
      if (nextNode) { path.push(nextNode); current = nextNode; }
    }

    network.unselectAll();
    for (let i = 0; i < path.length; i++) {
      await new Promise(r => setTimeout(r, 1200));
      network.selectNodes(path.slice(0, i + 1).map(n => n.id));
      network.focus(path[i].id, { scale: 1.5, animation: { duration: 800, easingFunction: 'easeInOutQuad' } });
      pathText.textContent = path.slice(0, i + 1).map(n => n.name_ko).join(' → ');
    }

    await new Promise(r => setTimeout(r, 2000));
    network.fit({ animation: { duration: 1000, easingFunction: 'easeInOutQuad' } });
    network.unselectAll();

    btn.classList.remove('running');
    btn.textContent = '🤖 AI 탐색 경로 시연';
    crawlRunning = false;
  };

  updateGraph();
</script>
